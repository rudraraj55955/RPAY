<script id="rasokart-fold-mobile-polish">
(function () {
  var MOBILE = 900;
  function isMobile(){ return window.innerWidth <= MOBILE; }
  function txt(el){ return (el.textContent || "").replace(/\s+/g, " ").trim(); }
  function imp(el, prop, val){ if (el && el.style) el.style.setProperty(prop, val, "important"); }

  function hideMobileNavExtras(){
    if (!isMobile()) return;
    var hide = {"Services":1,"Dashboard":1,"Settlement":1,"Plans":1,"Contact":1};
    document.querySelectorAll("header *, nav *").forEach(function(el){
      var t = txt(el);
      if (hide[t]) imp(el, "display", "none");
    });
  }

  function compactHero(){
    if (!isMobile()) return;
    if (location.pathname !== "/" && location.pathname !== "") return;

    var h1 = Array.prototype.slice.call(document.querySelectorAll("h1")).find(function(el){
      return txt(el).indexOf("Collect Smarter") !== -1;
    });
    if (!h1) return;

    var hero = h1.closest("section") || h1.parentElement;
    var main = document.querySelector("main");

    if (main) {
      imp(main, "padding-top", "0px");
      imp(main, "margin-top", "0px");
    }

    if (hero) {
      imp(hero, "min-height", "auto");
      imp(hero, "height", "auto");
      imp(hero, "padding-top", "18px");
      imp(hero, "padding-bottom", "36px");
      imp(hero, "display", "block");
      imp(hero, "align-items", "flex-start");
      imp(hero, "justify-content", "flex-start");
      imp(hero, "overflow", "hidden");
    }

    var node = h1;
    var depth = 0;
    while (node && depth < 12) {
      imp(node, "min-height", "auto");
      imp(node, "height", "auto");
      imp(node, "padding-top", "0px");
      imp(node, "margin-top", "0px");
      imp(node, "transform", "none");
      imp(node, "translate", "none");
      imp(node, "align-items", "flex-start");
      imp(node, "justify-content", "flex-start");
      if (node.tagName && node.tagName.toLowerCase() === "main") break;
      node = node.parentElement;
      depth++;
    }

    if (hero) {
      hero.querySelectorAll("*").forEach(function(el){
        var cs = window.getComputedStyle(el);
        var mt = parseFloat(cs.marginTop) || 0;
        var pt = parseFloat(cs.paddingTop) || 0;
        var mh = parseFloat(cs.minHeight) || 0;

        if (mt > 80) imp(el, "margin-top", "0px");
        if (pt > 80) imp(el, "padding-top", "0px");
        if (mh > 360) imp(el, "min-height", "auto");

        if ((cs.alignItems || "").includes("center")) imp(el, "align-items", "flex-start");
        if ((cs.justifyContent || "").includes("center")) imp(el, "justify-content", "flex-start");
      });
    }

    imp(h1, "font-size", "clamp(34px, 8.5vw, 48px)");
    imp(h1, "line-height", "1.08");
    imp(h1, "margin-top", "0px");

    var badge = Array.prototype.slice.call(document.querySelectorAll("span,div,p")).find(function(el){
      return txt(el).indexOf("Leading Payment Infrastructure") !== -1;
    });
    if (badge) {
      imp(badge, "margin-top", "0px");
    }
  }

  function run(){
    hideMobileNavExtras();
    compactHero();
  }

  function start(){
    run();
    setTimeout(run, 100);
    setTimeout(run, 500);
    setTimeout(run, 1200);
    window.addEventListener("resize", run);
    window.addEventListener("orientationchange", function(){ setTimeout(run, 300); });
    new MutationObserver(run).observe(document.body, {childList:true, subtree:true});
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", start, {once:true});
  } else {
    start();
  }
})();
</script>





<!-- RASOKART_TOKEN_MASK_V2_START -->
<style>
  .rk-token-copy-btn{
    margin-left:10px;
    padding:7px 11px;
    border-radius:10px;
    border:1px solid rgba(56,189,248,.35);
    background:rgba(14,165,233,.16);
    color:#e0f2fe;
    font-size:12px;
    font-weight:800;
    cursor:pointer;
    white-space:nowrap;
  }
  .rk-token-copy-btn:active{transform:scale(.98)}
  .rk-token-hidden{display:none!important}
</style>
<script>
(function(){
  var JWT_RE = /\beyJ[A-Za-z0-9_-]{8,}\.[A-Za-z0-9_-]{8,}\.[A-Za-z0-9_-]{8,}\b/g;

  function isDocsRoute(){
    return /(^|\/)(api-docs|merchant\/api-docs|admin\/api-docs)(\/|$)/i.test(location.pathname);
  }

  function isPrivateDocsRoute(){
    return /^\/(admin|merchant)\/api-docs(\/|$)/i.test(location.pathname);
  }

  function maskToken(token){
    if(!token || token.length <= 22) return "********";
    return token.slice(0,10) + "...****..." + token.slice(-6);
  }

  function makeBtn(token){
    var btn = document.createElement("button");
    btn.type = "button";
    btn.className = "rk-token-copy-btn";
    btn.textContent = "Copy Token";
    btn.onclick = function(e){
      e.preventDefault();
      e.stopPropagation();
      navigator.clipboard.writeText(token).then(function(){
        btn.textContent = "Copied";
        setTimeout(function(){ btn.textContent = "Copy Token"; }, 1200);
      }).catch(function(){
        btn.textContent = "Copy failed";
        setTimeout(function(){ btn.textContent = "Copy Token"; }, 1200);
      });
    };
    return btn;
  }

  function hidePublicTokenSection(){
    if(!isDocsRoute()) return;
    if(isPrivateDocsRoute()) return;

    var all = Array.prototype.slice.call(document.querySelectorAll("body *"));
    all.forEach(function(el){
      var txt = (el.textContent || "").trim();
      if(/Shared Bearer Token/i.test(txt) || JWT_RE.test(txt)){
        var box = el.closest("section,article,form,[class*='card'],[class*='Card'],[class*='rounded'],[class*='border'],div");
        if(box) box.classList.add("rk-token-hidden");
      }
      JWT_RE.lastIndex = 0;
    });
  }

  function maskInputValues(){
    if(!isDocsRoute()) return;

    var fields = Array.prototype.slice.call(document.querySelectorAll("input, textarea"));
    fields.forEach(function(el){
      var val = el.value || el.getAttribute("value") || "";
      var match = val.match(JWT_RE);
      if(!match) return;

      var original = match[0];
      var masked = val.replace(JWT_RE, function(t){ return maskToken(t); });

      el.dataset.rkOriginalToken = original;
      el.value = masked;
      el.setAttribute("value", masked);
      el.setAttribute("readonly", "readonly");
      el.style.textOverflow = "ellipsis";

      var parent = el.parentElement;
      if(parent && !parent.querySelector(".rk-token-copy-btn")){
        parent.appendChild(makeBtn(original));
      }
    });
  }

  function maskTextNodes(){
    if(!isDocsRoute()) return;

    var walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
    var nodes = [];
    var n;

    while(n = walker.nextNode()){
      var txt = n.nodeValue || "";
      if(JWT_RE.test(txt)) nodes.push(n);
      JWT_RE.lastIndex = 0;
    }

    nodes.forEach(function(node){
      var txt = node.nodeValue || "";
      var match = txt.match(JWT_RE);
      if(!match) return;

      var original = match[0];
      node.nodeValue = txt.replace(JWT_RE, function(t){ return maskToken(t); });

      var parent = node.parentElement;
      if(parent && !parent.querySelector(".rk-token-copy-btn")){
        parent.appendChild(makeBtn(original));
      }
    });
  }

  function maskCodeBlocks(){
    if(!isDocsRoute()) return;

    var blocks = Array.prototype.slice.call(document.querySelectorAll("code, pre, div, span, p"));
    blocks.forEach(function(el){
      if(el.children.length > 0 && !/Shared Bearer Token/i.test(el.textContent || "")) return;

      var txt = el.textContent || "";
      var match = txt.match(JWT_RE);
      if(!match) return;

      var original = match[0];
      el.textContent = txt.replace(JWT_RE, function(t){ return maskToken(t); });

      if(!el.querySelector(".rk-token-copy-btn") && el.parentElement){
        el.parentElement.appendChild(makeBtn(original));
      }
    });
  }

  function run(){
    hidePublicTokenSection();
    maskInputValues();
    maskTextNodes();
    maskCodeBlocks();
  }

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", run);
  }else{
    run();
  }

  var timer = null;
  new MutationObserver(function(){
    clearTimeout(timer);
    timer = setTimeout(run, 80);
  }).observe(document.documentElement, {
    childList:true,
    subtree:true,
    characterData:true,
    attributes:true,
    attributeFilter:["value"]
  });

  setInterval(run, 1000);
})();
</script>
<!-- RASOKART_TOKEN_MASK_V2_END -->

</body>
</html>
