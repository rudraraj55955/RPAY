kind = "api"
previewPath = "/api" # TODO - should be excluded from preview in the first place
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/api-server", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
# we don't run through pnpm to make startup faster in production
args = ["node", "--enable-source-maps", "artifacts/api-server/dist/index.mjs"]

[services.production.run.env]
PORT = "8080"
NODE_ENV = "production"

[services.production.health.startup]
# Deep check: verifies DB connection, schema columns, AND bcrypt-compares every
# documented demo/test account's password against the DB. If any credential is
# broken (wrong hash, wrong role, deactivated), this returns 503 and Replit
# does not route traffic to the new instance — catching seed regressions before
# real users see them. Use /api/healthz for frequent uptime pings (no bcrypt overhead).
path = "/api/healthz/deep"
